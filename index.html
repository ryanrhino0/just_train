<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Training Log">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <title>Training Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f97316;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --cyan: #22d3ee;
      --indigo: #6366f1;
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --muted: #555555;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: #e5e5e5;
      min-height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: calc(var(--safe-bottom) + 24px);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Loading Spinner */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 16px;
    }
    .loader .spin {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader span { color: var(--muted); font-size: 14px; }

    /* Header */
    header {
      padding: 20px 0 0;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .header-title {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: #fff;
      margin-top: 2px;
    }
    .countdown {
      text-align: right;
    }
    .countdown-num {
      font-family: 'DM Mono', monospace;
      font-size: 36px;
      font-weight: 500;
      color: var(--orange);
      line-height: 1;
    }
    .countdown-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Stats Bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 16px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: #fff;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-top: 16px;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: none;
      font-family: inherit;
    }
    .tab.active {
      background: var(--orange);
      color: #000;
    }

    /* Sync Bar */
    .sync-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .sync-dot.saving {
      background: var(--amber);
      animation: pulse 1s ease-in-out infinite;
    }
    .sync-dot.error {
      background: var(--red);
    }
    @keyframes pulse { 50% { opacity: 0.4; } }

    /* Tab Content */
    .tab-content { display: none; padding: 16px 0 32px; }
    .tab-content.active { display: block; }

    /* Date Picker */
    .date-picker {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .date-picker input[type="date"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      padding: 12px;
      outline: none;
    }
    .date-picker input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    /* Day Type Pills */
    .day-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .pill {
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .pill.active {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(249, 115, 22, 0.1);
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    .card-badge {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .input-row input[type="number"],
    .input-row input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      padding: 12px;
      outline: none;
      width: 100%;
    }
    .input-row input:focus {
      border-color: var(--orange);
    }
    .input-unit {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }
    .input-delta {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      white-space: nowrap;
    }

    /* Progress Bar */
    .progress-wrap {
      margin-top: 10px;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .progress-bar {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
      max-width: 100%;
    }

    /* Workout Toggle */
    .workout-card {
      cursor: pointer;
      transition: border-color 0.2s;
      user-select: none;
    }
    .workout-card.done {
      border-color: var(--green);
    }
    .workout-inner {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .workout-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 16px;
    }
    .workout-card.done .workout-check {
      background: var(--green);
      border-color: var(--green);
    }
    .workout-label {
      font-size: 16px;
      font-weight: 600;
    }

    /* Notes */
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #e5e5e5;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px;
      min-height: 80px;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: var(--orange); }

    /* Targets Grid */
    .targets-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 4px;
    }
    .target-item {
      text-align: center;
      padding: 8px;
      background: var(--bg);
      border-radius: 8px;
    }
    .target-val {
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: #fff;
    }
    .target-lbl {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* History */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.2s;
      display: grid;
      grid-template-columns: 48px 1fr auto;
      align-items: center;
      gap: 12px;
    }
    .history-card:active { border-color: var(--orange); }
    .history-score {
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      text-align: center;
      line-height: 1;
    }
    .history-score-label {
      font-size: 9px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }
    .history-mid { display: flex; flex-direction: column; gap: 2px; }
    .history-date {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: #fff;
    }
    .history-meta {
      font-size: 12px;
      color: var(--muted);
    }
    .history-right {
      text-align: right;
    }
    .history-daytype {
      font-size: 11px;
      color: var(--orange);
      font-weight: 600;
    }
    .history-workout {
      font-size: 11px;
      margin-top: 2px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 48px 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- Loader -->
<div class="app" id="loader">
  <div class="loader">
    <div class="spin"></div>
    <span>Loading training data...</span>
  </div>
</div>

<!-- Main App -->
<div class="app" id="app" style="display:none">

  <!-- Header -->
  <header>
    <div class="header-top">
      <div>
        <div class="header-label">Ryan Veres</div>
        <div class="header-title">Training Log</div>
      </div>
      <div class="countdown">
        <div class="countdown-num" id="countdown-days">--</div>
        <div class="countdown-label">days to race</div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="stat-weight">--</div>
        <div class="stat-label">Weight</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-lost">--</div>
        <div class="stat-label">Lost</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-togo">--</div>
        <div class="stat-label">To Go</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-avg-cal">--</div>
        <div class="stat-label">7d Avg Cal</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="today">Today</button>
      <button class="tab" data-tab="history">History</button>
    </div>
    <div class="sync-bar">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">Synced</span>
    </div>
  </header>

  <!-- Today Tab -->
  <div class="tab-content active" id="tab-today">

    <div class="date-picker">
      <input type="date" id="selected-date">
    </div>

    <div class="day-pills" id="day-pills"></div>

    <!-- Weight -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Morning Weight</span>
        <span class="card-badge input-delta" id="weight-delta"></span>
      </div>
      <div class="input-row">
        <input type="number" id="input-weight" placeholder="0" step="0.1" inputmode="decimal">
        <span class="input-unit">lbs</span>
      </div>
    </div>

    <!-- Calories -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Calories</span>
        <span class="card-badge" id="cal-badge">0 / --</span>
      </div>
      <div class="input-row">
        <input type="number" id="input-cal" placeholder="0" inputmode="numeric">
        <span class="input-unit">kcal</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="cal-progress" style="width:0%;background:var(--orange)"></div>
        </div>
      </div>
    </div>

    <!-- Protein -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Protein</span>
        <span class="card-badge" id="protein-badge">0 / --</span>
      </div>
      <div class="input-row">
        <input type="number" id="input-protein" placeholder="0" inputmode="numeric">
        <span class="input-unit">g</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="protein-progress" style="width:0%;background:var(--indigo)"></div>
        </div>
      </div>
    </div>

    <!-- Water -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Water</span>
        <span class="card-badge" id="water-badge">0 / 100</span>
      </div>
      <div class="input-row">
        <input type="number" id="input-water" placeholder="0" inputmode="numeric">
        <span class="input-unit">oz</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="water-progress" style="width:0%;background:var(--cyan)"></div>
        </div>
      </div>
    </div>

    <!-- Workout -->
    <div class="card workout-card" id="workout-card" onclick="toggleWorkout()">
      <div class="workout-inner">
        <div class="workout-check" id="workout-check"></div>
        <span class="workout-label">Workout Completed</span>
      </div>
    </div>

    <!-- Notes -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Notes</span>
      </div>
      <textarea id="input-notes" placeholder="Energy, food, sleep..."></textarea>
    </div>

    <!-- Targets -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Today's Targets</span>
      </div>
      <div class="targets-grid">
        <div class="target-item">
          <div class="target-val" id="target-cal">--</div>
          <div class="target-lbl">Calories</div>
        </div>
        <div class="target-item">
          <div class="target-val" id="target-protein">--</div>
          <div class="target-lbl">Protein</div>
        </div>
        <div class="target-item">
          <div class="target-val" id="target-water">--</div>
          <div class="target-lbl">Water (oz)</div>
        </div>
      </div>
    </div>
  </div>

  <!-- History Tab -->
  <div class="tab-content" id="tab-history">
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script>
  // --- Constants ---
  const SUPABASE_URL = 'https://vfcfdybqmawirygporic.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_r2DsBlPmISTTViQbG0PQXg_2WljdYu4';
  const RACE_DATE = new Date('2026-05-09');
  const START_WEIGHT = 200;
  const GOAL_WEIGHT = 180;
  const WEEK_SCHEDULE = ['Long Run','Lift Only','Run Day','Lift Only','Rest','Climb','Lift Only'];

  const TARGETS = {
    'Rest':      { cal: 1750, protein: 190, water: 100 },
    'Lift Only': { cal: 1950, protein: 200, water: 100 },
    'Run Day':   { cal: 2000, protein: 190, water: 100 },
    'Long Run':  { cal: 2200, protein: 190, water: 100 },
    'Climb':     { cal: 2000, protein: 190, water: 100 },
  };

  const DAY_TYPES = Object.keys(TARGETS);

  // --- Supabase ---
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // --- State ---
  let allLogs = {};
  let currentDate = todayStr();
  let workoutDone = false;
  let saveTimer = null;

  // --- Helpers ---
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatDate(str) {
    const [y, m, d] = str.split('-');
    return `${m}/${d}/${y}`;
  }

  function dayOfWeek(dateStr) {
    return new Date(dateStr + 'T12:00:00').getDay();
  }

  function defaultDayType(dateStr) {
    return WEEK_SCHEDULE[dayOfWeek(dateStr)];
  }

  function daysUntilRace() {
    const now = new Date();
    now.setHours(0,0,0,0);
    const diff = RACE_DATE - now;
    return Math.max(0, Math.ceil(diff / 86400000));
  }

  // --- Init ---
  async function init() {
    const { data, error } = await db.from('logs').select('*');
    if (error) {
      console.error('Fetch error:', error);
    }
    if (data) {
      data.forEach(row => { allLogs[row.date] = row; });
    }

    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    setupTabs();
    setupDatePicker();
    setupPills();
    setupInputListeners();
    updateCountdown();
    loadDay(currentDate);
    updateStats();
  }

  // --- Countdown ---
  function updateCountdown() {
    document.getElementById('countdown-days').textContent = daysUntilRace();
  }

  // --- Tabs ---
  function setupTabs() {
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'history') renderHistory();
      });
    });
  }

  // --- Date Picker ---
  function setupDatePicker() {
    const input = document.getElementById('selected-date');
    input.value = currentDate;
    input.addEventListener('change', () => {
      currentDate = input.value;
      loadDay(currentDate);
    });
  }

  // --- Day Type Pills ---
  function setupPills() {
    const container = document.getElementById('day-pills');
    DAY_TYPES.forEach(type => {
      const btn = document.createElement('button');
      btn.className = 'pill';
      btn.textContent = type;
      btn.addEventListener('click', () => {
        selectPill(type);
        scheduleSave();
      });
      container.appendChild(btn);
    });
  }

  function selectPill(type) {
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.toggle('active', p.textContent === type);
    });
    updateTargets(type);
  }

  function getSelectedDayType() {
    const active = document.querySelector('.pill.active');
    return active ? active.textContent : 'Rest';
  }

  // --- Targets ---
  function updateTargets(dayType) {
    const t = TARGETS[dayType];
    document.getElementById('target-cal').textContent = t.cal;
    document.getElementById('target-protein').textContent = t.protein;
    document.getElementById('target-water').textContent = t.water;
    updateProgressBars();
  }

  // --- Load Day ---
  function loadDay(dateStr) {
    const log = allLogs[dateStr];
    const dt = log ? log.day_type : defaultDayType(dateStr);

    selectPill(dt);

    document.getElementById('input-weight').value = log?.weight ?? '';
    document.getElementById('input-cal').value = log?.cal ?? '';
    document.getElementById('input-protein').value = log?.protein ?? '';
    document.getElementById('input-water').value = log?.water ?? '';
    document.getElementById('input-notes').value = log?.notes ?? '';

    workoutDone = log?.workout_done ?? false;
    updateWorkoutUI();
    updateWeightDelta();
    updateProgressBars();
  }

  // --- Weight Delta ---
  function updateWeightDelta() {
    const w = parseFloat(document.getElementById('input-weight').value);
    const el = document.getElementById('weight-delta');
    if (!w || isNaN(w)) {
      el.textContent = '';
      return;
    }
    const delta = w - START_WEIGHT;
    el.textContent = (delta >= 0 ? '+' : '') + delta.toFixed(1) + ' lbs';
    el.style.color = delta <= 0 ? 'var(--green)' : 'var(--red)';
  }

  // --- Progress Bars ---
  function updateProgressBars() {
    const dayType = getSelectedDayType();
    const t = TARGETS[dayType];

    const cal = parseInt(document.getElementById('input-cal').value) || 0;
    const protein = parseInt(document.getElementById('input-protein').value) || 0;
    const water = parseInt(document.getElementById('input-water').value) || 0;

    setProgress('cal', cal, t.cal, '--orange');
    setProgress('protein', protein, t.protein, '--indigo');
    setProgress('water', water, t.water, '--cyan');
  }

  function setProgress(id, current, target, colorVar) {
    const pct = target ? Math.min(100, (current / target) * 100) : 0;
    document.getElementById(id + '-progress').style.width = pct + '%';
    document.getElementById(id + '-badge').textContent = current + ' / ' + target;
  }

  // --- Workout Toggle ---
  function toggleWorkout() {
    workoutDone = !workoutDone;
    updateWorkoutUI();
    scheduleSave();
  }

  function updateWorkoutUI() {
    const card = document.getElementById('workout-card');
    const check = document.getElementById('workout-check');
    card.classList.toggle('done', workoutDone);
    check.innerHTML = workoutDone ? '&#10003;' : '';
  }

  // --- Input Listeners ---
  function setupInputListeners() {
    ['input-weight', 'input-cal', 'input-protein', 'input-water', 'input-notes'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        if (id === 'input-weight') updateWeightDelta();
        if (['input-cal', 'input-protein', 'input-water'].includes(id)) updateProgressBars();
        scheduleSave();
      });
    });
  }

  // --- Save / Sync ---
  function setSyncStatus(status) {
    const dot = document.getElementById('sync-dot');
    const text = document.getElementById('sync-text');
    dot.className = 'sync-dot';
    if (status === 'saving') {
      dot.classList.add('saving');
      text.textContent = 'Saving...';
    } else if (status === 'error') {
      dot.classList.add('error');
      text.textContent = 'Sync error';
    } else {
      text.textContent = 'Synced';
    }
  }

  function scheduleSave() {
    setSyncStatus('saving');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveDay, 800);
  }

  async function saveDay() {
    const row = {
      date: currentDate,
      cal: parseInt(document.getElementById('input-cal').value) || 0,
      protein: parseInt(document.getElementById('input-protein').value) || 0,
      water: parseInt(document.getElementById('input-water').value) || 0,
      weight: parseFloat(document.getElementById('input-weight').value) || null,
      day_type: getSelectedDayType(),
      workout_done: workoutDone,
      notes: document.getElementById('input-notes').value || null,
    };

    const { error } = await db.from('logs').upsert(row, { onConflict: 'date' });

    if (error) {
      console.error('Save error:', error);
      setSyncStatus('error');
    } else {
      allLogs[currentDate] = { ...allLogs[currentDate], ...row };
      setSyncStatus('synced');
      updateStats();
    }
  }

  // --- Header Stats ---
  function updateStats() {
    // Latest weight
    const sorted = Object.values(allLogs)
      .filter(l => l.weight)
      .sort((a, b) => b.date.localeCompare(a.date));

    const latest = sorted[0]?.weight;
    document.getElementById('stat-weight').textContent = latest ? latest.toFixed(1) : '--';
    document.getElementById('stat-lost').textContent = latest ? (START_WEIGHT - latest).toFixed(1) : '--';
    document.getElementById('stat-togo').textContent = latest ? (latest - GOAL_WEIGHT).toFixed(1) : '--';

    // 7-day avg cal
    const recent = Object.values(allLogs)
      .filter(l => l.cal > 0)
      .sort((a, b) => b.date.localeCompare(a.date))
      .slice(0, 7);

    if (recent.length > 0) {
      const avg = Math.round(recent.reduce((s, l) => s + l.cal, 0) / recent.length);
      document.getElementById('stat-avg-cal').textContent = avg;
    } else {
      document.getElementById('stat-avg-cal').textContent = '--';
    }
  }

  // --- History ---
  function calcScore(log) {
    const t = TARGETS[log.day_type] || TARGETS['Rest'];
    const calPct = t.cal ? Math.min(1, log.cal / t.cal) : 0;
    const proteinPct = t.protein ? Math.min(1, log.protein / t.protein) : 0;
    const workoutPct = log.workout_done ? 1 : 0;
    return Math.round(((calPct + proteinPct + workoutPct) / 3) * 100);
  }

  function scoreColor(score) {
    if (score >= 80) return 'var(--green)';
    if (score >= 60) return 'var(--amber)';
    return 'var(--red)';
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    const logs = Object.values(allLogs).sort((a, b) => b.date.localeCompare(a.date));

    if (logs.length === 0) {
      list.innerHTML = '<div class="empty-state">No logs yet. Start tracking today!</div>';
      return;
    }

    list.innerHTML = logs.map(log => {
      const score = calcScore(log);
      return `
        <div class="history-card" onclick="jumpToDay('${log.date}')">
          <div>
            <div class="history-score" style="color:${scoreColor(score)}">${score}</div>
            <div class="history-score-label">Score</div>
          </div>
          <div class="history-mid">
            <div class="history-date">${formatDate(log.date)}</div>
            <div class="history-meta">${log.weight ? log.weight + ' lbs' : '--'} &middot; ${log.cal} cal &middot; ${log.protein}g</div>
          </div>
          <div class="history-right">
            <div class="history-daytype">${log.day_type}</div>
            <div class="history-workout" style="color:${log.workout_done ? 'var(--green)' : 'var(--muted)'}">
              ${log.workout_done ? '&#10003; Done' : '&#10007; Skipped'}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function jumpToDay(dateStr) {
    currentDate = dateStr;
    document.getElementById('selected-date').value = dateStr;
    loadDay(dateStr);
    // Switch to Today tab
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-tab="today"]').classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-today').classList.add('active');
    window.scrollTo(0, 0);
  }

  // --- Boot ---
  init();
</script>
</body>
</html>
